# AT-STGCN main AUTSL setting for paper/main_zh_no_relation.tex.
# Skeleton-only: no TSSI image input and no optional relation-graph branch.
manifest: data/autsl_skeleton_manifest.csv
output_dir: runs/autsl_skeleton_stgcn_v5_arcface
image_height: 64
sequence_length: 64
model_type: skeleton
seed: 42
repair_missing_keypoints: true
repair_min_valid: 2

batch_size: 64
optimizer: adamw
weight_decay: 2.5e-4
dropout: 0.52
label_smoothing: 0.07
base_lr: 3.0e-4
max_lr: 1.8e-3
min_lr: 1.0e-5
epochs: 140
scheduler: cosine
warmup_epochs: 8
grad_clip_norm: 5.0
no_weight_decay_norm_bias: true
attention_lr_scale: 1.0
classifier_lr_scale: 1.3

skeleton_hidden_channels: 192
skeleton_blocks: 4
skeleton_adjacency_hops: 2
skeleton_dropout: 0.18
skeleton_temporal_kernel: 7
skeleton_temporal_dilations: [1]
skeleton_adaptive_graph: true
skeleton_edge_importance: true
skeleton_adaptive_scale: 0.08
skeleton_relation_graph: false
skeleton_relation_scale: 0.035
skeleton_relation_channels: 32
skeleton_stc_attention: true
skeleton_center_joints: true
skeleton_scale_normalize: true
skeleton_hand_weight: 1.25
skeleton_include_absolute_xy: true
skeleton_include_validity: true
skeleton_include_temporal_position: true
skeleton_include_root_motion: true
skeleton_include_acceleration: true
skeleton_pooling: avgmaxattn
skeleton_part_pooling: true
skeleton_part_pooling_scale: 1.0
feature_layer_norm: true
classifier_type: arcface
logit_scale: 32.0
classifier_margin: 0.18

center_loss:
  enabled: false
  weight: 0.0

ema:
  enabled: true
  decay: 0.999

sam:
  enabled: false
  rho: 0.02
  adaptive: false

loss:
  focal_gamma: 0.0

contrastive_loss:
  enabled: true
  weight: 0.025
  temperature: 0.08
  start_epoch: 96
  end_epoch: 140

class_weighting:
  enabled: false
  beta: 0.999

mixup:
  enabled: true
  alpha: 0.20
  prob: 0.45
  start_epoch: 1
  end_epoch: 95

eval_tta:
  flip: true
  scales: [0.95, 1.0, 1.05]

model_soup:
  enabled: true
  top_k: 10
  start_epoch: 80
  promote_if_better: true

augmentation:
  enabled: true
  scale: true
  shift: true
  noise: true
  rotate: true
  temporal_crop: true
  flip: true
  speed: true
  time_mask: true
  joint_mask: true
  scale_min: 0.90
  scale_max: 1.10
  shift_max: 0.025
  noise_std: 0.004
  rotate_degrees: 5.0
  temporal_crop_min_ratio: 0.90
  temporal_crop_max_ratio: 1.0
  flip_prob: 0.5
  swap_sides_on_flip: true
  speed_min_frames: 56
  speed_max_frames: 72
  time_mask_prob: 0.20
  time_mask_max_ratio: 0.10
  joint_mask_prob: 0.20
  joint_mask_max_width: 6
